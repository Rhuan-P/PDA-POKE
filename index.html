<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pokemon Battle Simulator - Real-time multiplayer Pokemon battles">
  <title>⚔️ Pokemon Battle Simulator</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Preconnect to API -->
  <link rel="preconnect" href="http://localhost:3001">
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-content">
        <div class="pokemon-loading">
          <div class="pokeball"></div>
        </div>
        <h2>Loading Pokemon Battle Arena...</h2>
        <p>Preparing your battle experience</p>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
  
  <style>
    /* Loading screen styles */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .pokemon-loading {
      margin-bottom: 30px;
    }
    
    .pokeball {
      width: 60px;
      height: 60px;
      background: linear-gradient(to bottom, #ff4444 50%, #ffffff 50%);
      border-radius: 50%;
      border: 3px solid #333;
      position: relative;
      animation: bounce 1s infinite;
      margin: 0 auto;
    }
    
    .pokeball::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 3px;
      background: #333;
      transform: translateY(-50%);
    }
    
    .pokeball::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 15px;
      height: 15px;
      background: white;
      border: 3px solid #333;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .loading-content h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .loading-content p {
      font-size: 1.1rem;
      opacity: 0.9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Hide loading screen when Vue app mounts */
    #app:not(:empty) .loading-screen {
      display: none;
    }
  </style>
</body>
</html>
